<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>老師工具 — 茲茲實驗課</title>
<link rel="stylesheet" href="css/style.css?v=2">
<style>
.tool-layout { display: grid; grid-template-columns: 220px 1fr; gap: 0; min-height: calc(100vh - 52px); }
.sidebar {
  background: var(--white);
  border-right: 1px solid var(--border);
  padding: 1.2rem 0;
}
.sidebar-title {
  font-size: 0.75rem; font-weight: 700;
  color: var(--text-light); letter-spacing: 0.08em;
  padding: 0 1.2rem 0.5rem;
  text-transform: uppercase;
}
.sidebar-btn {
  display: block; width: 100%;
  text-align: left; padding: 0.65rem 1.2rem;
  border: none; background: none; cursor: pointer;
  font-family: inherit; font-size: 0.88rem; color: var(--text);
  border-left: 3px solid transparent;
  transition: background 0.12s;
}
.sidebar-btn:hover { background: var(--teal-light); }
.sidebar-btn.active { border-left-color: var(--teal); background: var(--teal-light); color: var(--teal-dark); font-weight: 700; }
.sidebar-status { font-size: 0.72rem; color: var(--text-light); margin-left: 0.4rem; }

.main-panel { padding: 2rem; background: var(--bg); }

.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1.5rem;
}
.panel-header h2 { font-size: 1.1rem; font-weight: 700; color: var(--teal-dark); }

/* Materials progress */
.mat-progress {
  font-size: 0.82rem; color: var(--text-light);
  display: flex; align-items: center; gap: 0.6rem;
}
.mat-progress-bar {
  height: 8px; border-radius: 4px; background: var(--border);
  width: 120px; overflow: hidden;
}
.mat-progress-fill {
  height: 100%; background: var(--teal); border-radius: 4px;
  transition: width 0.3s;
}

/* Material sections */
.mat-section { margin-bottom: 1.5rem; }
.mat-section-title {
  font-size: 0.78rem; font-weight: 700;
  color: var(--text-light); letter-spacing: 0.05em;
  padding: 0.4rem 0; border-bottom: 1px solid var(--border);
  margin-bottom: 0.5rem; text-transform: uppercase;
}
.mat-by-fuda { color: var(--teal-dark); }
.mat-by-zhou { color: #6A7EC7; }

/* Notes */
.notes-box {
  background: var(--white); border-radius: 10px;
  border: 1.5px solid var(--border);
  padding: 1rem; margin-top: 1rem;
}
.notes-box label { font-size: 0.82rem; font-weight: 700; color: var(--teal-dark); display: block; margin-bottom: 0.4rem; }
.notes-box textarea {
  width: 100%; min-height: 90px; padding: 0.5rem;
  border: 1.5px solid var(--border); border-radius: 6px;
  font-family: inherit; font-size: 0.86rem; resize: vertical;
}
.notes-box textarea:focus { outline: none; border-color: var(--teal); }

/* Timeline */
.timeline-row {
  display: grid;
  grid-template-columns: 130px 1fr auto;
  gap: 0.8rem; align-items: start;
  padding: 0.55rem 0; border-bottom: 1px solid var(--border);
  font-size: 0.86rem;
}
.timeline-row:last-child { border-bottom: none; }
.timeline-time { color: var(--teal-dark); font-weight: 600; font-size: 0.82rem; white-space: nowrap; }
.timeline-note { font-size: 0.78rem; color: var(--text-light); margin-top: 0.2rem; }
.timeline-warn { font-size: 0.78rem; color: var(--red); margin-top: 0.2rem; }

/* Assistant notes */
.assist-item {
  padding: 0.45rem 0.75rem;
  border-left: 3px solid var(--orange);
  background: #FFFBF0;
  margin-bottom: 0.4rem;
  font-size: 0.86rem; border-radius: 0 6px 6px 0;
}

@media print {
  nav, .sidebar, .panel-header button { display: none !important; }
  .tool-layout { grid-template-columns: 1fr; }
  .main-panel { padding: 0; }
}
</style>
</head>
<body>

<nav>
  <span class="brand"><img src="茲茲icon.png" alt="茲茲">2026茲茲國小夏令營科學實驗</span>
  <a href="index.html">課程總覽</a>
  <a href="teacher.html" class="active">老師工具</a>
  <a href="materials.html">器材管理</a>
  <a href="generator.html">講義生成器</a>
</nav>

<div class="tool-layout">
  <div class="sidebar">
    <div class="sidebar-title">選擇堂次</div>
    <div id="sidebar-sessions"></div>
    <div style="padding:1.2rem 1.2rem 0; border-top:1px solid var(--border); margin-top:1rem;">
      <div class="sidebar-title">快速操作</div>
      <button class="sidebar-btn" onclick="printMaterials()">🖨️ 列印器材清單</button>
      <button class="sidebar-btn" onclick="resetChecks()">♻️ 重置勾選</button>
    </div>
  </div>

  <div class="main-panel" id="main-panel">
    <div style="color:var(--text-light); font-size:0.9rem; margin-top:3rem; text-align:center;">
      ← 請從左側選擇堂次
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script>
let currentSession = null;

// Build sidebar
const sidebar = document.getElementById('sidebar-sessions');
COURSE.sessions.forEach(s => {
  const btn = document.createElement('button');
  btn.className = 'sidebar-btn';
  btn.dataset.id = s.id;
  const statusIcon = s.status === 'ready' ? '✅' : '🔧';
  btn.innerHTML = `${statusIcon} 第 ${s.id} 堂<br><span class="sidebar-status">${s.dateDisplay} ${s.category}</span>`;
  btn.onclick = () => showSession(s.id);
  sidebar.appendChild(btn);
});

function getChecks(sessionId) {
  return JSON.parse(localStorage.getItem(`checks_${sessionId}`) || '{}');
}
function saveChecks(sessionId, checks) {
  localStorage.setItem(`checks_${sessionId}`, JSON.stringify(checks));
}
function getNotes(sessionId) {
  return localStorage.getItem(`notes_${sessionId}`) || '';
}
function saveNotes(sessionId, val) {
  localStorage.setItem(`notes_${sessionId}`, val);
}

function showSession(id) {
  currentSession = id;
  const s = COURSE.sessions.find(x => x.id === id);

  // Update sidebar active
  document.querySelectorAll('.sidebar-btn[data-id]').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.id) === id);
  });

  const checks = getChecks(id);
  const checkedCount = Object.values(checks).filter(Boolean).length;
  const total = s.materials.length;

  // Group materials by prepBy
  const byFuda = s.materials.filter(m => m.prepBy === '福大老師');
  const byZhou = s.materials.filter(m => m.prepBy !== '福大老師');

  function matRows(list, group) {
    return list.map((m, i) => {
      const key = `${group}_${i}`;
      const checked = checks[key] || false;
      return `
      <div class="checklist-item ${checked ? 'done' : ''}" id="item_${group}_${i}">
        <input type="checkbox" id="cb_${group}_${i}" ${checked ? 'checked' : ''}
          onchange="toggleCheck(${id}, '${key}', this.checked)">
        <label for="cb_${group}_${i}" style="cursor:pointer;flex:1">
          <strong>${m.name}</strong>
          <span style="color:var(--text-light);font-size:0.8rem;margin-left:0.4rem">${m.qty} ${m.unit}</span>
          ${m.note ? `<span style="color:var(--text-light);font-size:0.78rem;display:block">${m.note}</span>` : ''}
        </label>
      </div>`;
    }).join('');
  }

  const pct = total > 0 ? Math.round(checkedCount / total * 100) : 0;

  const riskLabel = ['', '低', '中', '中高', '高'][s.riskLevel];
  const riskColor = s.riskLevel >= 3 ? 'var(--red)' : s.riskLevel === 2 ? 'var(--orange)' : 'var(--green)';

  document.getElementById('main-panel').innerHTML = `
  <div class="panel-header">
    <div>
      <h2>第 ${s.id} 堂｜${s.title}</h2>
      <div style="font-size:0.82rem;color:var(--text-light);margin-top:0.2rem">
        📅 ${s.dateDisplay} ｜ ${s.category} ｜ 難度：${s.difficulty} ｜
        <span style="color:${riskColor}">⚠ 風險：${riskLabel}</span>
        ${s.takeHome !== '無' ? `｜ 🎁 帶回：${s.takeHome}` : ''}
      </div>
    </div>
    <button class="btn btn-outline" onclick="window.print()">🖨️ 列印</button>
  </div>

  <!-- 器材清單 -->
  <div class="section-title">器材準備清單</div>
  <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem">
    <div class="mat-progress">
      <span>進度 ${checkedCount}/${total}</span>
      <div class="mat-progress-bar">
        <div class="mat-progress-fill" id="prog-fill" style="width:${pct}%"></div>
      </div>
      <span id="prog-pct">${pct}%</span>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem">
    <div>
      <div class="mat-section">
        <div class="mat-section-title mat-by-fuda">福大老師準備</div>
        ${matRows(byFuda, 'fuda')}
      </div>
    </div>
    <div>
      <div class="mat-section">
        <div class="mat-section-title mat-by-zhou">周老師協助準備</div>
        ${matRows(byZhou, 'zhou')}
      </div>
    </div>
  </div>

  <!-- 時間流程 -->
  <div class="section-title" style="margin-top:2rem">課堂時間流程</div>
  <div style="background:var(--white);border-radius:10px;padding:0.5rem 1rem;box-shadow:var(--shadow)">
    ${s.timeline.map(t => `
    <div class="timeline-row ${t.warning ? 'warn-row' : ''}">
      <div class="timeline-time">${t.time}</div>
      <div>
        <div>${t.activity}</div>
        ${t.note ? `<div class="${t.warning ? 'timeline-warn' : 'timeline-note'}">⚠ ${t.note}</div>` : ''}
      </div>
    </div>`).join('')}
  </div>

  <!-- 教學目標 -->
  <div class="section-title" style="margin-top:2rem">教學目標</div>
  <ul style="padding-left:1.3rem;font-size:0.88rem;line-height:1.9;background:var(--white);border-radius:10px;padding:0.8rem 1.2rem 0.8rem 2rem;box-shadow:var(--shadow)">
    ${s.objectives.map(o => `<li>${o}</li>`).join('')}
  </ul>

  <!-- 助教注意事項 -->
  ${s.assistantNotes ? `
  <div class="section-title" style="margin-top:2rem">助教協助注意事項</div>
  <div style="background:var(--white);border-radius:10px;padding:0.8rem 1rem;box-shadow:var(--shadow)">
    ${s.assistantNotes.map(n => `<div class="assist-item">${n}</div>`).join('')}
  </div>` : ''}

  <!-- 老師備忘 -->
  <div class="notes-box" style="margin-top:2rem">
    <label>📝 老師備忘（自動儲存）</label>
    <textarea id="teacher-notes" placeholder="輸入備忘事項..."
      oninput="saveNotes(${id}, this.value)">${getNotes(id)}</textarea>
  </div>
  `;

  // Re-attach note save
  const notesEl = document.getElementById('teacher-notes');
  if (notesEl) {
    notesEl.addEventListener('input', () => saveNotes(id, notesEl.value));
  }
}

function toggleCheck(sessionId, key, val) {
  const checks = getChecks(sessionId);
  checks[key] = val;
  saveChecks(sessionId, checks);
  // Update item style
  const group = key.split('_')[0];
  const idx   = key.split('_')[1];
  const item  = document.getElementById(`item_${group}_${idx}`);
  if (item) item.classList.toggle('done', val);
  // Update progress
  const s = COURSE.sessions.find(x => x.id === sessionId);
  const checkedCount = Object.values(checks).filter(Boolean).length;
  const pct = Math.round(checkedCount / s.materials.length * 100);
  const fill = document.getElementById('prog-fill');
  const pctEl = document.getElementById('prog-pct');
  if (fill) fill.style.width = pct + '%';
  if (pctEl) pctEl.textContent = pct + '%';
}

function resetChecks() {
  if (!currentSession) return;
  if (!confirm('確定要重置此堂的所有勾選紀錄嗎？')) return;
  localStorage.removeItem(`checks_${currentSession}`);
  showSession(currentSession);
}

function printMaterials() {
  if (!currentSession) { alert('請先選擇堂次'); return; }
  window.print();
}

// Auto-select first session
showSession(1);
</script>
</body>
</html>
