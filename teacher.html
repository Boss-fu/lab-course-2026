<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>課前準備 — 茲茲實驗課</title>
<link rel="stylesheet" href="css/style2.css">
<style>
/* === Layout === */
.tool-layout { display: grid; grid-template-columns: 230px 1fr; gap: 0; min-height: calc(100vh - 52px); }
.sidebar { background: var(--white); border-right: 1px solid var(--border); padding: 1.2rem 0; display: flex; flex-direction: column; }
.sidebar-scroll { overflow-y: auto; flex: 1; }
.sidebar-title { font-size: 0.72rem; font-weight: 700; color: var(--text-light); letter-spacing: 0.08em; padding: 0 1.2rem 0.4rem; text-transform: uppercase; }
.sidebar-btn { display: block; width: 100%; text-align: left; padding: 0.6rem 1.2rem; border: none; background: none; cursor: pointer; font-family: inherit; font-size: 0.86rem; color: var(--text); border-left: 3px solid transparent; transition: background 0.12s; }
.sidebar-btn:hover { background: var(--teal-light); }
.sidebar-btn.active { border-left-color: var(--teal); background: var(--teal-light); color: var(--teal-dark); font-weight: 700; }
.sidebar-status { font-size: 0.71rem; color: var(--text-light); display: block; margin-top: 0.1rem; }
.sidebar-divider { border: none; border-top: 1px solid var(--border); margin: 0.8rem 0; }

/* === Course toggle === */
.course-toggle { display: flex; margin: 0 1.2rem 1rem; border: 1.5px solid var(--border); border-radius: 8px; overflow: hidden; }
.course-toggle-btn { flex: 1; border: none; cursor: pointer; font-family: inherit; font-size: 0.78rem; font-weight: 600; padding: 0.45rem 0.3rem; background: var(--white); color: var(--text-light); transition: background 0.15s, color 0.15s; }
.course-toggle-btn.active { background: var(--teal); color: #fff; }
.course-toggle-btn:not(:last-child) { border-right: 1.5px solid var(--border); }

/* === Edit mode sidebar btn === */
.sidebar-btn-edit { color: var(--teal-dark); font-weight: 600; }
.sidebar-btn-edit.on { background: var(--teal); color: #fff; border-left-color: var(--teal-dark); }
.sidebar-btn-edit.on:hover { background: var(--teal-dark); }

/* === Main panel === */
.main-panel { padding: 2rem; background: var(--bg); overflow-y: auto; }

/* === Normal view === */
.panel-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.5rem; gap: 1rem; }
.panel-header h2 { font-size: 1.1rem; font-weight: 700; color: var(--teal-dark); margin-bottom: 0.2rem; }
.mat-progress { font-size: 0.82rem; color: var(--text-light); display: flex; align-items: center; gap: 0.6rem; }
.mat-progress-bar { height: 8px; border-radius: 4px; background: var(--border); width: 120px; overflow: hidden; }
.mat-progress-fill { height: 100%; background: var(--teal); border-radius: 4px; transition: width 0.3s; }
.mat-section-title { font-size: 0.76rem; font-weight: 700; letter-spacing: 0.05em; padding: 0.4rem 0; border-bottom: 1px solid var(--border); margin-bottom: 0.5rem; text-transform: uppercase; }
.mat-by-fuda { color: var(--teal-dark); }
.mat-by-zhou { color: #5588CC; }
.timeline-row { display: grid; grid-template-columns: 130px 1fr; gap: 0.8rem; align-items: start; padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.86rem; }
.timeline-row:last-child { border-bottom: none; }
.timeline-time { color: var(--teal-dark); font-weight: 600; font-size: 0.81rem; }
.timeline-note { font-size: 0.77rem; color: var(--text-light); margin-top: 0.15rem; }
.timeline-warn { font-size: 0.77rem; color: var(--red); margin-top: 0.15rem; }
.assist-item { padding: 0.4rem 0.7rem; border-left: 3px solid var(--orange); background: var(--teal-light); margin-bottom: 0.4rem; font-size: 0.85rem; border-radius: 0 6px 6px 0; }
.notes-box { background: var(--white); border-radius: 10px; border: 1.5px solid var(--border); padding: 1rem; margin-top: 1rem; }
.notes-box label { font-size: 0.81rem; font-weight: 700; color: var(--teal-dark); display: block; margin-bottom: 0.4rem; }
.notes-box textarea { width: 100%; min-height: 80px; padding: 0.5rem; border: 1.5px solid var(--border); border-radius: 6px; font-family: inherit; font-size: 0.85rem; resize: vertical; box-sizing: border-box; }
.notes-box textarea:focus { outline: none; border-color: var(--teal); }

/* === Edit mode === */
.edit-banner { background: #FFF8E0; border: 1.5px solid #E8C840; border-radius: 8px; padding: 0.6rem 1rem; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; font-size: 0.83rem; color: #7A5000; gap: 0.5rem; flex-wrap: wrap; }
.edit-banner-btns { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.edit-card { background: var(--white); border-radius: 10px; box-shadow: var(--shadow); padding: 1.2rem 1.4rem; margin-bottom: 1.1rem; }
.edit-card-title { font-size: 0.8rem; font-weight: 700; color: var(--teal-dark); margin-bottom: 0.8rem; letter-spacing: 0.04em; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
.edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.65rem; }
.edit-field { display: flex; flex-direction: column; gap: 0.2rem; }
.edit-field label { font-size: 0.72rem; font-weight: 600; color: var(--text-light); }
.edit-inp { padding: 0.38rem 0.55rem; border: 1.5px solid var(--border); border-radius: 6px; font-family: inherit; font-size: 0.84rem; color: var(--text); background: var(--bg); width: 100%; box-sizing: border-box; }
.edit-inp:focus { outline: none; border-color: var(--teal); background: var(--white); }
.edit-row { display: flex; gap: 0.35rem; align-items: center; margin-bottom: 0.4rem; }
.edit-del { background: none; border: 1.5px solid #EEB0B0; color: #CC3333; border-radius: 5px; padding: 0.18rem 0.48rem; font-size: 0.76rem; cursor: pointer; flex-shrink: 0; line-height: 1.4; }
.edit-del:hover { background: #FFE8E8; }
.edit-add { background: none; border: 1.5px dashed var(--teal); color: var(--teal-dark); border-radius: 6px; padding: 0.3rem 0.8rem; font-size: 0.81rem; cursor: pointer; width: 100%; margin-top: 0.35rem; font-family: inherit; }
.edit-add:hover { background: var(--teal-light); }
.edit-hint { font-size: 0.71rem; color: var(--text-light); font-weight: 400; }

@media print {
  nav, .sidebar, .panel-header button, .edit-banner { display: none !important; }
  .tool-layout { grid-template-columns: 1fr; }
  .main-panel { padding: 0; }
}
</style>
</head>
<body>

<nav>
  <span class="brand"><img src="茲茲icon.png" alt="茲茲">茲茲實驗課</span>
  <a href="index.html">首頁</a>
  <a href="elementary.html">國小課程</a>
  <a href="middle.html">國中課程</a>
  <a href="materials.html">實驗與器材</a>
  <a href="teacher.html" class="active">課前準備</a>
  <a href="generator.html">講義生成器</a>
</nav>

<div class="tool-layout">
  <div class="sidebar">
    <div class="sidebar-scroll">
      <div style="padding-top:0.4rem">
        <div class="sidebar-title" style="margin-bottom:0.5rem">選擇課程</div>
        <div class="course-toggle">
          <button class="course-toggle-btn active" id="btn-elementary" onclick="switchCourse('elementary')">🔬 國小</button>
          <button class="course-toggle-btn" id="btn-middle" onclick="switchCourse('middle')">🧲 國中</button>
        </div>
        <div class="sidebar-title">選擇堂次</div>
        <div id="sidebar-sessions"></div>
      </div>
    </div>

    <div style="border-top:1px solid var(--border); padding: 0.8rem 0 0.4rem">
      <div class="sidebar-title">工具</div>
      <button class="sidebar-btn sidebar-btn-edit" id="edit-mode-btn" onclick="toggleEditMode()">✏️ 編輯模式</button>
      <button class="sidebar-btn" id="export-btn" onclick="exportData()" style="display:none;color:var(--teal-dark)">📥 匯出 JS 檔</button>
      <button class="sidebar-btn" onclick="printMaterials()">🖨️ 列印</button>
      <button class="sidebar-btn" onclick="resetChecks()">♻️ 重置勾選</button>
    </div>
  </div>

  <div class="main-panel" id="main-panel">
    <div style="color:var(--text-light);font-size:0.9rem;margin-top:3rem;text-align:center">
      ← 請從左側選擇堂次
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/data-middle.js?v=2"></script>
<script>
// ═══════════════════════════════════════════
//  State
// ═══════════════════════════════════════════
let currentCourse = 'elementary';
let currentSession = null;
let editMode = false;
const _sCache = {}; // key: `${course}_${id}` → session object

// ═══════════════════════════════════════════
//  Data Layer  (per-session localStorage)
//  已編輯的堂次 → localStorage
//  未動過的堂次 → 直接讀 JS 檔（data.js / data-middle.js）
// ═══════════════════════════════════════════
function _sKey(id) {
  return `sEdit_${currentCourse === 'middle' ? 'm' : 'e'}_${id}`;
}

function getSession(id) {
  const ck = `${currentCourse}_${id}`;
  if (_sCache[ck]) return _sCache[ck];
  const raw = currentCourse === 'middle' ? COURSE_MIDDLE : COURSE;
  const saved = localStorage.getItem(_sKey(id));
  _sCache[ck] = saved
    ? JSON.parse(saved)
    : JSON.parse(JSON.stringify(raw.sessions.find(x => x.id === id)));
  return _sCache[ck];
}

function getCourseData() {
  const raw = currentCourse === 'middle' ? COURSE_MIDDLE : COURSE;
  return { ...raw, sessions: raw.sessions.map(s => getSession(s.id)) };
}

function saveData(id) {
  localStorage.setItem(_sKey(id), JSON.stringify(_sCache[`${currentCourse}_${id}`]));
  updateExportBtn();
}

function updateExportBtn() {
  const raw = currentCourse === 'middle' ? COURSE_MIDDLE : COURSE;
  const has = raw.sessions.some(s => localStorage.getItem(_sKey(s.id)));
  const btn = document.getElementById('export-btn');
  if (btn) btn.style.display = has ? '' : 'none';
}

// ═══════════════════════════════════════════
//  Utility
// ═══════════════════════════════════════════
function esc(v) {
  return String(v ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function storageKey(type, id) {
  return `${type}_${currentCourse === 'middle' ? 'm' : 'e'}_${id}`;
}
function getChecks(id)       { return JSON.parse(localStorage.getItem(storageKey('checks', id)) || '{}'); }
function saveChecks(id, obj) { localStorage.setItem(storageKey('checks', id), JSON.stringify(obj)); }
function getNotes(id)        { return localStorage.getItem(storageKey('notes', id)) || ''; }
function saveNotes(id, val)  { localStorage.setItem(storageKey('notes', id), val); }

// ═══════════════════════════════════════════
//  Course / Sidebar
// ═══════════════════════════════════════════
function switchCourse(type) {
  currentCourse = type;
  currentSession = null;
  document.getElementById('btn-elementary').classList.toggle('active', type === 'elementary');
  document.getElementById('btn-middle').classList.toggle('active', type === 'middle');
  buildSidebar();
  updateExportBtn();
  showSession(1);
}

const sidebar = document.getElementById('sidebar-sessions');
function buildSidebar() {
  sidebar.innerHTML = '';
  getCourseData().sessions.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'sidebar-btn';
    btn.dataset.id = s.id;
    const icon = s.status === 'ready' ? '✅' : '🔧';
    btn.innerHTML = `${icon} 第 ${s.id} 堂<span class="sidebar-status">${s.dateDisplay}　${s.category}</span>`;
    btn.onclick = () => showSession(s.id);
    sidebar.appendChild(btn);
  });
}
buildSidebar();

// ═══════════════════════════════════════════
//  Edit Mode Toggle
// ═══════════════════════════════════════════
function toggleEditMode() {
  editMode = !editMode;
  const btn = document.getElementById('edit-mode-btn');
  btn.textContent = editMode ? '👁 預覽模式' : '✏️ 編輯模式';
  btn.classList.toggle('on', editMode);
  if (currentSession) showSession(currentSession);
}

function exportData() {
  const data = getCourseData();
  const varName = currentCourse === 'middle' ? 'COURSE_MIDDLE' : 'COURSE';
  const content = `const ${varName} = ${JSON.stringify(data, null, 2)};\n`;
  const blob = new Blob([content], {type: 'text/javascript'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = currentCourse === 'middle' ? 'data-middle.js' : 'data.js';
  a.click();
}

// ═══════════════════════════════════════════
//  Edit Functions
// ═══════════════════════════════════════════
function editField(id, field, value) {
  const s = getSession(id);
  if (field === 'riskLevel') {
    const rl = parseInt(value);
    s.riskLevel = rl;
    s.risk = ['—','低','中','中高','高'][rl] || '—';
  } else {
    s[field] = value;
  }
  saveData(id);
  if (['title','status','category','dateDisplay'].includes(field)) buildSidebar();
}

function editMat(id, i, field, v)  { getSession(id).materials[i][field] = v; saveData(id); }
function delMat(id, i)             { getSession(id).materials.splice(i,1); saveData(id); showSession(id); }
function addMat(id)                { getSession(id).materials.push({name:'',qty:'',unit:'份',note:'',prepBy:'福大老師'}); saveData(id); showSession(id); }

function editTL(id, i, field, v)   { if (field==='warning') v=Boolean(v); getSession(id).timeline[i][field]=v; saveData(id); }
function delTL(id, i)              { getSession(id).timeline.splice(i,1); saveData(id); showSession(id); }
function addTL(id)                 { getSession(id).timeline.push({time:'',activity:'',warning:false,note:''}); saveData(id); showSession(id); }

function editObj(id, i, v)         { getSession(id).objectives[i] = v; saveData(id); }
function delObj(id, i)             { getSession(id).objectives.splice(i,1); saveData(id); showSession(id); }
function addObj(id)                { getSession(id).objectives.push(''); saveData(id); showSession(id); }

function editAst(id, i, v)         { getSession(id).assistantNotes[i] = v; saveData(id); }
function delAst(id, i)             { getSession(id).assistantNotes.splice(i,1); saveData(id); showSession(id); }
function addAst(id)                { getSession(id).assistantNotes.push(''); saveData(id); showSession(id); }

function applyTemplate(id) {
  const s = getSession(id);
  if (!s.title || s.title === '實驗尚未確認') s.title = '新實驗';
  if (!s.category || s.category === '待定') s.category = '化學';
  if (!s.difficulty || s.difficulty === '—') s.difficulty = '中';
  if (!s.riskLevel) { s.riskLevel = 1; s.risk = '低'; }
  if (!s.takeHome || s.takeHome === '—') s.takeHome = '待定';
  s.status = 'ready';
  if (!s.experiments?.length || !s.experiments[0]) s.experiments = ['實驗名稱（請填寫）'];
  if (!s.objectives?.length || !s.objectives[0])
    s.objectives = ['理解實驗的核心原理','動手操作實驗流程','觀察並記錄實驗現象'];
  if (!s.timeline?.length || !s.timeline[0]?.time)
    s.timeline = [
      {time:'10:00–10:15', activity:'原理講解', warning:false, note:''},
      {time:'10:15–10:45', activity:'Part A：主要實驗', warning:false, note:''},
      {time:'10:45–11:20', activity:'Part B：進階實驗', warning:false, note:''},
      {time:'11:20–11:45', activity:'結果分享與討論', warning:false, note:''},
      {time:'11:45–12:00', activity:'清潔整理', warning:false, note:''},
    ];
  if (!s.materials?.length || !s.materials[0]?.name)
    s.materials = [{name:'',qty:'',unit:'份',note:'',prepBy:'福大老師'}];
  if (!s.assistantNotes?.length || !s.assistantNotes[0])
    s.assistantNotes = [''];
  saveData(id);
  buildSidebar();
  showSession(id);
}

function resetSession(id) {
  if (!confirm('確定還原此堂次的預設資料？此堂次的所有修改將消失。')) return;
  localStorage.removeItem(_sKey(id));
  delete _sCache[`${currentCourse}_${id}`];
  updateExportBtn();
  buildSidebar();
  showSession(id);
}

// ═══════════════════════════════════════════
//  Render: Edit View
// ═══════════════════════════════════════════
function renderEditView(s, id) {
  const riskOpts = ['—','低','中','中高','高'].map((l,i) =>
    `<option value="${i}" ${s.riskLevel===i?'selected':''}>${l}</option>`).join('');

  const matHtml = (s.materials||[]).map((m,i) => `
    <div class="edit-row">
      <input class="edit-inp" style="flex:2;min-width:0" value="${esc(m.name)}" placeholder="器材名稱"
        oninput="editMat(${id},${i},'name',this.value)">
      <input class="edit-inp" style="width:54px" value="${esc(m.qty)}" placeholder="數量"
        oninput="editMat(${id},${i},'qty',this.value)">
      <input class="edit-inp" style="width:42px" value="${esc(m.unit||'')}" placeholder="單位"
        oninput="editMat(${id},${i},'unit',this.value)">
      <select class="edit-inp" style="width:78px" onchange="editMat(${id},${i},'prepBy',this.value)">
        <option value="福大老師" ${m.prepBy==='福大老師'?'selected':''}>福大</option>
        <option value="周老師" ${m.prepBy!=='福大老師'?'selected':''}>周老師</option>
      </select>
      <input class="edit-inp" style="flex:2;min-width:0" value="${esc(m.note||'')}" placeholder="備註"
        oninput="editMat(${id},${i},'note',this.value)">
      <button class="edit-del" onclick="delMat(${id},${i})">✕</button>
    </div>`).join('');

  const tlHtml = (s.timeline||[]).map((t,i) => `
    <div class="edit-row">
      <input class="edit-inp" style="width:108px" value="${esc(t.time)}" placeholder="時間段"
        oninput="editTL(${id},${i},'time',this.value)">
      <input class="edit-inp" style="flex:2;min-width:0" value="${esc(t.activity)}" placeholder="活動內容"
        oninput="editTL(${id},${i},'activity',this.value)">
      <label style="font-size:0.75rem;white-space:nowrap;display:flex;align-items:center;gap:0.25rem;cursor:pointer" title="⚠ 勾選=警告">
        <input type="checkbox" ${t.warning?'checked':''} onchange="editTL(${id},${i},'warning',this.checked)">⚠
      </label>
      <input class="edit-inp" style="flex:1;min-width:0" value="${esc(t.note||'')}" placeholder="注意事項"
        oninput="editTL(${id},${i},'note',this.value)">
      <button class="edit-del" onclick="delTL(${id},${i})">✕</button>
    </div>`).join('');

  const objHtml = (s.objectives||[]).map((o,i) => `
    <div class="edit-row">
      <input class="edit-inp" style="flex:1" value="${esc(o)}" placeholder="輸入教學目標"
        oninput="editObj(${id},${i},this.value)">
      <button class="edit-del" onclick="delObj(${id},${i})">✕</button>
    </div>`).join('');

  const astHtml = (s.assistantNotes||[]).map((n,i) => `
    <div class="edit-row">
      <input class="edit-inp" style="flex:1" value="${esc(n)}" placeholder="輸入注意事項"
        oninput="editAst(${id},${i},this.value)">
      <button class="edit-del" onclick="delAst(${id},${i})">✕</button>
    </div>`).join('');

  document.getElementById('main-panel').innerHTML = `
  <div class="edit-banner">
    <span>✏️ 編輯模式 — 變更即時儲存至瀏覽器</span>
    <div class="edit-banner-btns">
      ${s.status==='pending'?`<button class="btn" style="font-size:0.81rem" onclick="applyTemplate(${id})">🪄 套用課程架構</button>`:''}
      <button class="btn" style="font-size:0.81rem" onclick="exportData()">📥 匯出 JS 檔</button>
      <button class="btn btn-outline" style="font-size:0.81rem" onclick="resetSession(${id})">↩️ 還原預設</button>
    </div>
  </div>

  <div class="edit-card">
    <div class="edit-card-title">📋 基本資訊</div>
    <div class="edit-grid">
      <div class="edit-field" style="grid-column:1/-1">
        <label>課程名稱</label>
        <input class="edit-inp" value="${esc(s.title)}" oninput="editField(${id},'title',this.value)">
      </div>
      <div class="edit-field">
        <label>日期顯示</label>
        <input class="edit-inp" value="${esc(s.dateDisplay)}" oninput="editField(${id},'dateDisplay',this.value)">
      </div>
      <div class="edit-field">
        <label>分類</label>
        <select class="edit-inp" onchange="editField(${id},'category',this.value)">
          ${['化學','物理','生物','跨科'].map(c=>`<option ${s.category===c?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
      <div class="edit-field">
        <label>難度</label>
        <select class="edit-inp" onchange="editField(${id},'difficulty',this.value)">
          ${['易','中','難'].map(d=>`<option ${s.difficulty===d?'selected':''}>${d}</option>`).join('')}
        </select>
      </div>
      <div class="edit-field">
        <label>風險等級</label>
        <select class="edit-inp" onchange="editField(${id},'riskLevel',this.value)">${riskOpts}</select>
      </div>
      <div class="edit-field">
        <label>帶回成品</label>
        <input class="edit-inp" value="${esc(s.takeHome||'')}" oninput="editField(${id},'takeHome',this.value)">
      </div>
      <div class="edit-field">
        <label>狀態</label>
        <select class="edit-inp" onchange="editField(${id},'status',this.value)">
          <option value="ready" ${s.status==='ready'?'selected':''}>✅ 講義已完成</option>
          <option value="pending" ${s.status==='pending'?'selected':''}>🔧 製作中</option>
        </select>
      </div>
      <div class="edit-field">
        <label>講義檔案路徑</label>
        <input class="edit-inp" value="${esc(s.handout||'')}" placeholder="handouts/xxx.pdf"
          oninput="editField(${id},'handout',this.value)">
      </div>
    </div>
  </div>

  <div class="edit-card">
    <div class="edit-card-title">
      <span>🧪 器材準備清單</span>
      <span class="edit-hint">名稱 ｜ 數量 ｜ 單位 ｜ 準備人 ｜ 備註</span>
    </div>
    ${matHtml}
    <button class="edit-add" onclick="addMat(${id})">＋ 新增器材</button>
  </div>

  <div class="edit-card">
    <div class="edit-card-title">
      <span>⏱ 課堂時間流程</span>
      <span class="edit-hint">時間 ｜ 活動 ｜ ⚠ ｜ 注意事項</span>
    </div>
    ${tlHtml}
    <button class="edit-add" onclick="addTL(${id})">＋ 新增步驟</button>
  </div>

  <div class="edit-card">
    <div class="edit-card-title">🎯 教學目標</div>
    ${objHtml}
    <button class="edit-add" onclick="addObj(${id})">＋ 新增目標</button>
  </div>

  <div class="edit-card">
    <div class="edit-card-title">📌 助教注意事項</div>
    ${astHtml}
    <button class="edit-add" onclick="addAst(${id})">＋ 新增注意事項</button>
  </div>
  `;
}

// ═══════════════════════════════════════════
//  Render: Normal View
// ═══════════════════════════════════════════
function renderNormalView(s, id) {
  const checks = getChecks(id);
  const checkedCount = Object.values(checks).filter(Boolean).length;
  const total = s.materials.length;
  const pct = total > 0 ? Math.round(checkedCount / total * 100) : 0;
  const byFuda = s.materials.filter(m => m.prepBy === '福大老師');
  const byZhou = s.materials.filter(m => m.prepBy !== '福大老師');

  function matRows(list, group) {
    return list.map((m, i) => {
      const key = `${group}_${i}`;
      const checked = checks[key] || false;
      return `<div class="checklist-item ${checked?'done':''}" id="item_${group}_${i}">
        <input type="checkbox" id="cb_${group}_${i}" ${checked?'checked':''}
          onchange="toggleCheck(${id},'${key}',this.checked)">
        <label for="cb_${group}_${i}" style="cursor:pointer;flex:1">
          <strong>${m.name}</strong>
          <span style="color:var(--text-light);font-size:0.79rem;margin-left:0.3rem">${m.qty} ${m.unit||''}</span>
          ${m.note?`<span style="color:var(--text-light);font-size:0.77rem;display:block">${m.note}</span>`:''}
        </label>
      </div>`;
    }).join('');
  }

  const riskLabel = ['','低','中','中高','高'][s.riskLevel] || '—';
  const riskColor = s.riskLevel >= 3 ? 'var(--red)' : s.riskLevel === 2 ? 'var(--orange)' : 'var(--green)';

  document.getElementById('main-panel').innerHTML = `
  <div class="panel-header">
    <div>
      <h2>第 ${s.id} 堂｜${s.title}</h2>
      <div style="font-size:0.81rem;color:var(--text-light)">
        📅 ${s.dateDisplay} ｜ ${s.category} ｜ 難度：${s.difficulty} ｜
        <span style="color:${riskColor}">⚠ 風險：${riskLabel}</span>
        ${s.takeHome&&s.takeHome!=='無'&&s.takeHome!=='—'?`｜ 🎁 帶回：${s.takeHome}`:''}
      </div>
    </div>
    <button class="btn btn-outline" onclick="window.print()">🖨️ 列印</button>
  </div>

  <div class="section-title">器材準備清單</div>
  <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem">
    <div class="mat-progress">
      <span>進度 ${checkedCount}/${total}</span>
      <div class="mat-progress-bar"><div class="mat-progress-fill" id="prog-fill" style="width:${pct}%"></div></div>
      <span id="prog-pct">${pct}%</span>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem">
    <div>
      <div class="mat-section-title mat-by-fuda">福大老師準備</div>
      ${matRows(byFuda,'fuda')}
    </div>
    <div>
      <div class="mat-section-title mat-by-zhou">周老師協助準備</div>
      ${matRows(byZhou,'zhou')}
    </div>
  </div>

  <div class="section-title" style="margin-top:2rem">課堂時間流程</div>
  <div style="background:var(--white);border-radius:10px;padding:0.5rem 1rem;box-shadow:var(--shadow)">
    ${s.timeline.map(t=>`
    <div class="timeline-row">
      <div class="timeline-time">${t.time}</div>
      <div>
        <div>${t.activity}</div>
        ${t.note?`<div class="${t.warning?'timeline-warn':'timeline-note'}">⚠ ${t.note}</div>`:''}
      </div>
    </div>`).join('')}
  </div>

  <div class="section-title" style="margin-top:2rem">教學目標</div>
  <ul style="background:var(--white);border-radius:10px;padding:0.8rem 1.2rem 0.8rem 2.2rem;box-shadow:var(--shadow);font-size:0.87rem;line-height:1.9;margin:0">
    ${s.objectives.map(o=>`<li>${o}</li>`).join('')}
  </ul>

  ${s.assistantNotes&&s.assistantNotes.filter(Boolean).length?`
  <div class="section-title" style="margin-top:2rem">助教協助注意事項</div>
  <div style="background:var(--white);border-radius:10px;padding:0.8rem 1rem;box-shadow:var(--shadow)">
    ${s.assistantNotes.map(n=>`<div class="assist-item">${n}</div>`).join('')}
  </div>`:''}

  <div class="notes-box" style="margin-top:2rem">
    <label>📝 老師備忘（自動儲存至瀏覽器）</label>
    <textarea id="teacher-notes" placeholder="輸入備忘事項…">${getNotes(id)}</textarea>
  </div>
  `;

  const el = document.getElementById('teacher-notes');
  if (el) el.addEventListener('input', () => saveNotes(id, el.value));
}

// ═══════════════════════════════════════════
//  Main: show session
// ═══════════════════════════════════════════
function showSession(id) {
  currentSession = id;
  const s = getSession(id);
  if (!s) return;

  document.querySelectorAll('.sidebar-btn[data-id]').forEach(b =>
    b.classList.toggle('active', parseInt(b.dataset.id) === id));

  if (editMode) { renderEditView(s, id); return; }

  if (s.status === 'pending') {
    document.getElementById('main-panel').innerHTML = `
    <div style="text-align:center;padding:4rem 2rem;color:var(--text-light)">
      <div style="font-size:2.5rem;margin-bottom:1rem">🔧</div>
      <div style="font-size:1.1rem;font-weight:700;color:var(--text);margin-bottom:0.5rem">第 ${s.id} 堂｜實驗尚未確認</div>
      <div style="font-size:0.87rem;margin-bottom:1.5rem">實驗內容尚未規劃，點下方按鈕開始設定此堂次。</div>
      <button class="btn" onclick="toggleEditMode()">✏️ 開始設定此堂次</button>
    </div>`;
    return;
  }
  renderNormalView(s, id);
}

// ═══════════════════════════════════════════
//  Check / print helpers
// ═══════════════════════════════════════════
function toggleCheck(sessionId, key, val) {
  const checks = getChecks(sessionId);
  checks[key] = val;
  saveChecks(sessionId, checks);
  const [group, idx] = key.split('_');
  const item = document.getElementById(`item_${group}_${idx}`);
  if (item) item.classList.toggle('done', val);
  const s = getSession(sessionId);
  if (!s || !s.materials.length) return;
  const cnt = Object.values(checks).filter(Boolean).length;
  const pct = Math.round(cnt / s.materials.length * 100);
  const fill = document.getElementById('prog-fill');
  const pctEl = document.getElementById('prog-pct');
  if (fill) fill.style.width = pct + '%';
  if (pctEl) pctEl.textContent = pct + '%';
}

function resetChecks() {
  if (!currentSession) return;
  if (!confirm('確定要重置此堂的所有勾選紀錄嗎？')) return;
  localStorage.removeItem(storageKey('checks', currentSession));
  showSession(currentSession);
}

function printMaterials() {
  if (!currentSession) { alert('請先選擇堂次'); return; }
  window.print();
}

// ═══════════════════════════════════════════
//  Init: URL params
// ═══════════════════════════════════════════
const _p = new URLSearchParams(window.location.search);
const _s = parseInt(_p.get('s')) || 1;
if (_p.get('course') === 'middle') {
  currentCourse = 'middle';
  document.getElementById('btn-elementary').classList.remove('active');
  document.getElementById('btn-middle').classList.add('active');
  buildSidebar();
}
updateExportBtn();
showSession(_s >= 1 && _s <= getCourseData().sessions.length ? _s : 1);
</script>
</body>
</html>
