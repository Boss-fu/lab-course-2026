<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>器材管理 — 茲茲實驗課</title>
<link rel="stylesheet" href="css/style2.css">
<style>
.filter-bar {
  display: flex; gap: 0.6rem; flex-wrap: wrap;
  padding: 1rem 2rem;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  align-items: center;
}
.filter-bar input {
  padding: 0.4rem 0.8rem;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-family: inherit; font-size: 0.86rem;
  min-width: 200px;
}
.filter-bar input:focus { outline: none; border-color: var(--teal); }
.filter-bar select {
  padding: 0.4rem 0.7rem;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-family: inherit; font-size: 0.86rem;
  background: var(--white); cursor: pointer;
}
.filter-bar select:focus { outline: none; border-color: var(--teal); }
.filter-label { font-size: 0.82rem; color: var(--text-light); }

/* Status badges */
.s-bought  { background:#E6F9EF; color:#1A7040; padding:0.15rem 0.5rem; border-radius:20px; font-size:0.75rem; font-weight:600; white-space:nowrap; }
.s-arrived { background:#E0EEFF; color:#1A50A0; padding:0.15rem 0.5rem; border-radius:20px; font-size:0.75rem; font-weight:600; white-space:nowrap; }
.s-school  { background:#FFF3E0; color:#A05000; padding:0.15rem 0.5rem; border-radius:20px; font-size:0.75rem; font-weight:600; white-space:nowrap; }
.s-pending { background:#F0F0F0; color:#666666; padding:0.15rem 0.5rem; border-radius:20px; font-size:0.75rem; font-weight:600; white-space:nowrap; }

/* Stats bar */
.stats-bar {
  display: flex; gap: 1.5rem; flex-wrap: wrap;
  padding: 0.8rem 2rem;
  background: var(--teal-light);
  font-size: 0.84rem;
}
.stat { display: flex; align-items: center; gap: 0.4rem; }
.stat strong { color: var(--teal-dark); font-size: 1rem; }

/* Experiment grid */
.exp-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1rem;
}
.exp-card {
  background: var(--white);
  border-radius: 10px;
  box-shadow: var(--shadow);
  padding: 1rem;
  border-left: 4px solid var(--teal);
}
.exp-card.cat-化學 { border-left-color: #E89020; }
.exp-card.no-id { opacity: 0.6; border-left-style: dashed; }
.exp-card h4 { font-size: 0.88rem; font-weight: 700; margin-bottom: 0.4rem; }
.exp-card .meta { font-size: 0.76rem; color: var(--text-light); display: flex; gap: 0.6rem; flex-wrap: wrap; }
.exp-id { font-size: 0.72rem; font-weight: 700; background: var(--teal); color: #fff; padding: 0.1rem 0.4rem; border-radius: 4px; }
.exp-id.cat-化學 { background: #E89020; }
.exp-session-link {
  display: inline-block; margin-top: 0.6rem;
  font-size: 0.75rem; font-weight: 600;
  color: var(--teal-dark); text-decoration: none;
  border: 1.5px solid var(--teal); border-radius: 6px;
  padding: 0.15rem 0.55rem;
  transition: background 0.15s;
}
.exp-session-link:hover { background: var(--teal-light); }

/* Table container */
.table-wrap { overflow-x: auto; }
.mat-table { width: 100%; border-collapse: collapse; font-size: 0.84rem; white-space: nowrap; }
.mat-table th {
  background: var(--teal); color: #fff;
  padding: 0.55rem 0.8rem; text-align: left;
  position: sticky; top: 0;
}
.mat-table td { padding: 0.5rem 0.8rem; border-bottom: 1px solid var(--border); }
.mat-table tr:hover td { background: var(--teal-light); }
.mat-table tr.hidden { display: none; }
.cat-tag {
  font-size: 0.72rem; padding: 0.1rem 0.45rem;
  border-radius: 4px; font-weight: 600;
}
.cat-耗材       { background: #E0EEFF; color: #2255AA; }
.cat-工具       { background: #F0F0F0; color: #555555; }
.cat-文具       { background: #FFF0E0; color: #996620; }
.cat-安全       { background: #FFE8E8; color: #990000; }
.cat-粉狀藥品   { background: #F0E8FF; color: #662299; }
.cat-液體藥品   { background: #E8F4FF; color: #1A4A88; }
.cat-玻璃實驗器材 { background: #E8FFF0; color: #1A7040; }
.cat-非玻璃實驗器材 { background: #E0F8FF; color: #1A6677; }
.cat-一次性食材  { background: #FFFFF0; color: #777700; }

/* Edit mode */
.mat-edit-banner { background:#FFF8E0; border:1.5px solid #E8C840; border-radius:8px; padding:0.5rem 1rem; margin:0.8rem 2rem; display:flex; align-items:center; justify-content:space-between; font-size:0.83rem; color:#7A5000; gap:0.5rem; flex-wrap:wrap; }
.edit-cell-inp { padding:0.28rem 0.45rem; border:1.5px solid var(--border); border-radius:5px; font-family:inherit; font-size:0.82rem; color:var(--text); background:var(--white); width:100%; box-sizing:border-box; }
.edit-cell-inp:focus { outline:none; border-color:var(--teal); }
.row-del-btn { background:none; border:1.5px solid #EEB0B0; color:#CC3333; border-radius:4px; padding:0.15rem 0.45rem; font-size:0.75rem; cursor:pointer; white-space:nowrap; }
.row-del-btn:hover { background:#FFE8E8; }
.row-add-btn { background:none; border:1.5px dashed var(--teal); color:var(--teal-dark); border-radius:6px; padding:0.3rem; font-size:0.82rem; cursor:pointer; width:100%; margin-top:0.5rem; font-family:inherit; }
.row-add-btn:hover { background:var(--teal-light); }
.mat-edit-active { background:var(--teal); color:#fff; border-color:var(--teal); }
</style>
</head>
<body>

<nav>
  <span class="brand"><img src="茲茲icon.png" alt="茲茲">茲茲實驗課</span>
  <a href="index.html">首頁</a>
  <a href="elementary.html">國小課程</a>
  <a href="middle.html">國中課程</a>
  <a href="materials.html" class="active">器材管理</a>
  <a href="teacher.html">課前準備</a>
  <a href="generator.html">講義生成器</a>
</nav>

<div class="hero" style="padding:1.5rem 2rem">
  <h1>器材管理</h1>
  <p>採購進度追蹤 ｜ 實驗總表 ｜ 器材清單</p>
</div>

<div class="stats-bar" id="stats-bar"></div>

<div class="tabs" style="padding:0 2rem;background:var(--white);border-bottom:2px solid var(--border)">
  <button class="tab active" onclick="switchTab('purchase', this)">實驗器材清單</button>
  <button class="tab" onclick="switchTab('experiments', this)">實驗總表</button>
  <button class="tab" id="mat-edit-btn" onclick="toggleMatEdit(this)" style="margin-left:auto">✏️ 編輯器材</button>
</div>
<div class="mat-edit-banner" id="mat-edit-banner" style="display:none">
  <span>✏️ 編輯模式 — 點格子直接修改，離開格子自動儲存</span>
  <div style="display:flex;gap:0.4rem">
    <button class="btn" style="font-size:0.81rem" onclick="exportMatData()">📥 匯出 JS 檔</button>
    <button class="btn btn-outline" style="font-size:0.81rem" onclick="resetMatData()">↩️ 還原預設</button>
  </div>
</div>

<!-- 採購清單 tab -->
<div id="tab-purchase" class="tab-content active">
  <div class="filter-bar">
    <input type="text" id="search" placeholder="🔍 搜尋器材名稱…" oninput="filterTable()">
    <span class="filter-label">篩選：</span>
    <select id="filter-cat" onchange="filterTable()">
      <option value="">所有分類</option>
      <option>耗材</option><option>工具</option><option>文具</option>
      <option>安全</option><option>粉狀藥品</option><option>液體藥品</option>
      <option>玻璃實驗器材</option><option>非玻璃實驗器材</option>
      <option>一次性食材</option>
    </select>
    <select id="filter-status" onchange="filterTable()">
      <option value="">所有狀態</option>
      <option value="bought">已購買</option>
      <option value="arrived">已到貨</option>
      <option value="pending">待購買</option>
    </select>
    <span id="count-display" style="margin-left:auto;font-size:0.82rem;color:var(--text-light)"></span>
  </div>
  <div style="padding:1.5rem 2rem">
    <div class="table-wrap">
      <table class="mat-table" id="mat-table">
        <thead>
          <tr>
            <th>器材名稱</th>
            <th>規格</th>
            <th>分類</th>
            <th>數量</th>
            <th>備註</th>
            <th>採購狀態</th>
            <th>到貨狀態</th>
            <th>購買通路</th>
          </tr>
        </thead>
        <tbody id="mat-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- 實驗總表 tab -->
<div id="tab-experiments" class="tab-content">
  <div style="padding:1.5rem 2rem">
    <div class="section-title">已規劃實驗（含未來課程）</div>
    <div class="exp-grid" id="exp-grid"></div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/materials-data.js?v=2"></script>
<script>

// ── Data layer (localStorage > JS default) ──
let _matCache = null;
let matEditMode = false;

function getMatData() {
  if (_matCache) return _matCache;
  const saved = localStorage.getItem('materialsEdit');
  _matCache = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(MATERIALS_LIST));
  return _matCache;
}

function saveMatData() {
  localStorage.setItem('materialsEdit', JSON.stringify(_matCache));
}

function resetMatData() {
  if (!confirm('確定還原所有器材清單到預設值？所有修改將消失。')) return;
  localStorage.removeItem('materialsEdit');
  _matCache = null;
  renderStats();
  renderTable();
}

function exportMatData() {
  const data = getMatData();
  const content = `const MATERIALS_LIST = ${JSON.stringify(data, null, 2)};\n`;
  const blob = new Blob([content], {type: 'text/javascript'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'materials-data-export.js';
  a.click();
}

function toggleMatEdit(btn) {
  matEditMode = !matEditMode;
  btn.textContent = matEditMode ? '👁 預覽' : '✏️ 編輯器材';
  btn.classList.toggle('mat-edit-active', matEditMode);
  document.getElementById('mat-edit-banner').style.display = matEditMode ? '' : 'none';
  renderTable();
  renderStats();
}

// ── Stats ──
function renderStats() {
  const list = getMatData();
  const total   = list.length;
  const bought  = list.filter(m => m.purchaseStatus && m.purchaseStatus.includes('已購買')).length;
  const arrived = list.filter(m => m.arrivalStatus && m.arrivalStatus.includes('已到貨')).length;
  const pending = total - bought;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat">共 <strong>${total}</strong> 項器材</div>
    <div class="stat"><span class="s-bought">已購買</span> <strong>${bought}</strong> 項</div>
    <div class="stat"><span class="s-arrived">已到貨</span> <strong>${arrived}</strong> 項</div>
    <div class="stat"><span class="s-pending">待購買</span> <strong>${pending}</strong> 項</div>
    ${matEditMode ? `<div class="stat" style="margin-left:auto"><button class="btn" style="font-size:0.8rem" onclick="addMatRow()">＋ 新增器材</button></div>` : ''}
  `;
}

// ── Materials table ──
const CAT_LIST = ['耗材','工具','文具','安全','粉狀藥品','液體藥品','玻璃實驗器材','非玻璃實驗器材','一次性食材'];
const STATUS_LIST = ['','已購買','補習班準備','俊瑋已購買','福大可借到'];
const ARRIVAL_LIST = ['','已到貨'];

function saveMatRow(i, field, value) {
  getMatData()[i][field] = value || null;
  saveMatData();
  if (['purchaseStatus','arrivalStatus'].includes(field)) renderStats();
}

function deleteMatRow(i) {
  if (!confirm(`確定刪除「${getMatData()[i].name}」？`)) return;
  getMatData().splice(i, 1);
  saveMatData();
  renderStats();
  renderTable();
}

function addMatRow() {
  getMatData().push({name:'新器材',spec:null,qty:null,cat:'耗材',unitPrice:null,shares:null,note:null,purchaseStatus:null,arrivalStatus:null,channel:null});
  saveMatData();
  renderStats();
  renderTable();
  // Scroll to bottom
  const tbody = document.getElementById('mat-tbody');
  tbody.lastElementChild?.scrollIntoView({block:'center'});
}

function renderTable() {
  const list = getMatData();
  const tbody = document.getElementById('mat-tbody');

  if (matEditMode) {
    const catOpts = CAT_LIST.map(c=>`<option>${c}</option>`).join('');
    tbody.innerHTML = list.map((m, i) => {
      const purchaseOpts = STATUS_LIST.map(s=>`<option ${m.purchaseStatus===s?'selected':''}>${s}</option>`).join('');
      const arrivalOpts  = ARRIVAL_LIST.map(s=>`<option ${m.arrivalStatus===s?'selected':''}>${s}</option>`).join('');
      const catOptsSel   = CAT_LIST.map(c=>`<option ${m.cat===c?'selected':''}>${c}</option>`).join('');
      return `
      <tr data-name="${m.name||''}" data-cat="${m.cat||''}" data-bought="${m.purchaseStatus||''}" data-arrived="${m.arrivalStatus||''}">
        <td><input class="edit-cell-inp" value="${m.name||''}" placeholder="名稱" onchange="saveMatRow(${i},'name',this.value)"></td>
        <td><input class="edit-cell-inp" style="width:120px" value="${m.spec||''}" placeholder="規格" onchange="saveMatRow(${i},'spec',this.value)"></td>
        <td><select class="edit-cell-inp" style="width:100px" onchange="saveMatRow(${i},'cat',this.value)">${catOptsSel}</select></td>
        <td><input class="edit-cell-inp" style="width:60px" value="${m.qty||''}" placeholder="數量" onchange="saveMatRow(${i},'qty',this.value)"></td>
        <td style="white-space:normal;min-width:120px"><input class="edit-cell-inp" value="${m.note||''}" placeholder="備註/儲存位置" onchange="saveMatRow(${i},'note',this.value)"></td>
        <td><select class="edit-cell-inp" style="width:110px" onchange="saveMatRow(${i},'purchaseStatus',this.value)">${purchaseOpts}</select></td>
        <td><select class="edit-cell-inp" style="width:80px" onchange="saveMatRow(${i},'arrivalStatus',this.value)">${arrivalOpts}</select></td>
        <td><input class="edit-cell-inp" style="width:100px" value="${m.channel||''}" placeholder="通路/URL" onchange="saveMatRow(${i},'channel',this.value)"></td>
        <td><button class="row-del-btn" onclick="deleteMatRow(${i})">🗑 刪除</button></td>
      </tr>`;
    }).join('');
    // Edit mode: add delete column header
    const thead = document.querySelector('#mat-table thead tr');
    if (thead && !thead.querySelector('.del-th')) {
      const th = document.createElement('th');
      th.className = 'del-th';
      th.style.background = 'var(--red)';
      th.textContent = '操作';
      thead.appendChild(th);
    }
  } else {
    // Remove delete column header if present
    const delTh = document.querySelector('#mat-table thead .del-th');
    if (delTh) delTh.remove();

    tbody.innerHTML = list.map((m, i) => {
      const purchaseBadge = m.purchaseStatus
        ? m.purchaseStatus.includes('已購買')
          ? `<span class="s-bought">${m.purchaseStatus}</span>`
          : `<span class="s-school">${m.purchaseStatus}</span>`
        : '<span class="s-pending">待購買</span>';
      const arrivalBadge = m.arrivalStatus ? `<span class="s-arrived">${m.arrivalStatus}</span>` : '—';
      let channel = '—';
      if (m.channel) {
        channel = m.channel.startsWith('http')
          ? `<a href="${m.channel}" target="_blank" style="color:var(--teal-dark);font-size:0.78rem">🔗 購買連結</a>`
          : m.channel;
      }
      return `
      <tr data-name="${m.name||''}" data-cat="${m.cat||''}" data-bought="${m.purchaseStatus||''}" data-arrived="${m.arrivalStatus||''}">
        <td><strong>${m.name}</strong></td>
        <td>${m.spec||'—'}</td>
        <td><span class="cat-tag cat-${m.cat}">${m.cat}</span></td>
        <td>${m.qty||'—'}</td>
        <td style="white-space:normal;max-width:180px;font-size:0.8rem">${m.note||'—'}</td>
        <td>${purchaseBadge}</td>
        <td>${arrivalBadge}</td>
        <td style="font-size:0.8rem">${channel}</td>
      </tr>`;
    }).join('');
  }
  updateCount();
}

function filterTable() {
  const search = document.getElementById('search').value.toLowerCase();
  const cat    = document.getElementById('filter-cat').value;
  const status = document.getElementById('filter-status').value;
  document.querySelectorAll('#mat-tbody tr').forEach(row => {
    const name    = (row.dataset.name||'').toLowerCase();
    const rowCat  = row.dataset.cat;
    const bought  = row.dataset.bought;
    const arrived = row.dataset.arrived;
    const matchSearch = !search || name.includes(search);
    const matchCat    = !cat || rowCat === cat;
    let   matchStatus = true;
    if (status === 'bought')  matchStatus = bought.includes('已購買');
    if (status === 'arrived') matchStatus = arrived.includes('已到貨');
    if (status === 'pending') matchStatus = !bought.includes('已購買');
    row.classList.toggle('hidden', !(matchSearch && matchCat && matchStatus));
  });
  updateCount();
}

function updateCount() {
  const visible = document.querySelectorAll('#mat-tbody tr:not(.hidden)').length;
  document.getElementById('count-display').textContent = `顯示 ${visible} 項`;
}

// ── Experiments grid ──
const SESSION_LINK_MAP = {
  'P01': 'teacher.html?s=1',
  'C01': 'teacher.html?s=2',
  'P02': 'teacher.html?s=3',
  'P03': 'teacher.html?s=4',
  'C02': 'teacher.html?s=5',
  '中1': 'teacher.html?course=middle&s=1',
};

function renderExperiments() {
  const grid = document.getElementById('exp-grid');
  grid.innerHTML = ALL_EXPERIMENTS.map(e => {
    const idBadge = e.id
      ? `<span class="exp-id cat-${e.cat}">${e.id}</span>`
      : `<span style="font-size:0.72rem;color:#aaa">規劃中</span>`;
    const sessionLink = SESSION_LINK_MAP[e.id]
      ? `<a class="exp-session-link" href="${SESSION_LINK_MAP[e.id]}">📋 課前準備</a>`
      : '';
    return `
    <div class="exp-card cat-${e.cat} ${e.id ? '' : 'no-id'}">
      <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem">
        ${idBadge}
        <span class="badge badge-cat" style="font-size:0.72rem">${e.cat}</span>
      </div>
      <h4>${e.title}</h4>
      <div class="meta">
        <span>⏱ ${e.duration} 分鐘</span>
        <span>👥 ${e.format}</span>
      </div>
      <div style="font-size:0.76rem;color:var(--text-light);margin-top:0.4rem">${e.concept}</div>
      ${sessionLink}
    </div>`;
  }).join('');
}

// ── Tabs ──
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

// Init
getMatData(); // warm cache
renderStats();
renderTable();
renderExperiments();
</script>
</body>
</html>
