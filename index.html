<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>茲茲實驗課</title>
<link rel="stylesheet" href="css/style2.css">
<style>
.landing {
  min-height: calc(100vh - 52px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 3rem 2rem;
}
.landing-title {
  font-size: 1rem;
  color: var(--text-light);
  letter-spacing: 0.1em;
  margin-bottom: 0.4rem;
}
.landing-subtitle {
  font-size: 2rem;
  font-weight: 800;
  color: var(--teal);
  margin-bottom: 3rem;
  letter-spacing: 0.02em;
}
.category-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 360px));
  gap: 2rem;
  justify-content: center;
  width: 100%;
  max-width: 820px;
}
.category-card {
  background: #2A1E10;
  border: 2px solid #3D2A10;
  border-radius: 16px;
  padding: 2.5rem 2rem;
  text-decoration: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
  transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
}
.category-card:hover {
  border-color: var(--teal);
  transform: translateY(-5px);
  box-shadow: 0 10px 36px rgba(232,184,64,0.22);
}
.category-icon { font-size: 3rem; line-height: 1; }
.category-label {
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--teal);
  letter-spacing: 0.05em;
}
.category-desc {
  font-size: 0.85rem;
  color: var(--text-light);
  text-align: center;
  line-height: 1.8;
}
.category-badge {
  font-size: 0.75rem;
  padding: 0.2rem 0.9rem;
  border-radius: 20px;
  font-weight: 600;
  background: #3D2A08;
  color: var(--teal);
  border: 1px solid rgba(232,184,64,0.3);
}
</style>
</head>
<body>

<nav>
  <span class="brand"><img src="茲茲icon.png" alt="茲茲">茲茲實驗課</span>
  <a href="materials.html">器材管理</a>
  <a href="teacher.html">老師工具</a>
  <a href="generator.html">講義生成器</a>
</nav>

<div class="landing">
  <div class="landing-title">請選擇課程分類</div>
  <div class="landing-subtitle">⚗️ 茲茲實驗課 2026</div>

  <div class="category-grid">
    <a href="elementary.html" class="category-card">
      <div class="category-icon">🔬</div>
      <div class="category-label">國小實驗課</div>
      <div class="category-desc">
        國小五、六年級<br>
        2026 暑期夏令營<br>
        7/6 ～ 8/24
      </div>
      <div class="category-badge">5 堂 ｜ 全數完成</div>
    </a>

    <a href="middle.html" class="category-card">
      <div class="category-icon">🧲</div>
      <div class="category-label">國中實驗課</div>
      <div class="category-desc">
        國中生（含升國一）<br>
        進階科學探索<br>
        難度更高、概念更深
      </div>
      <div class="category-badge">共 5 堂 ｜ 1 堂完成</div>
    </a>
  </div>
</div>

</body>
</html>
